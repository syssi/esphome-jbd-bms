substitutions:
  name: jbd-bms-ble
  bms0: "bms0"
  bms1: "bms1"
  device_description: "Monitor and control a Xiaoxiang Battery Management System (JBD-BMS) via BLE"
  external_components_source: github://syssi/esphome-jbd-bms@main
  bms0_mac_address: 70:3e:97:07:c0:3e
  bms1_mac_address: 70:3e:97:07:c0:3f

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jbd-bms"
    version: 2.4.0
  devices:
    - id: device0
      name: "${bms0}"
    - id: device1
      name: "${bms1}"

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - switch.turn_off: ble_client_switch1
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: DEBUG

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: ${bms0_mac_address}
    id: client0
  - mac_address: ${bms1_mac_address}
    id: client1

jbd_bms_ble:
  - id: bms0
    ble_client_id: client0
    update_interval: 5s
  - id: bms1
    ble_client_id: client1
    update_interval: 5s

button:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    retrieve_hardware_version:
      name: "retrieve hardware version"
      device_id: device0
    retrieve_error_counts:
      name: "retrieve error counts"
      device_id: device0
    force_soc_reset:
      name: "force soc reset"
      device_id: device0

  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms1
    retrieve_hardware_version:
      name: "retrieve hardware version"
      device_id: device1
    retrieve_error_counts:
      name: "retrieve error counts"
      device_id: device1
    force_soc_reset:
      name: "force soc reset"
      device_id: device1

binary_sensor:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    balancing:
      name: "balancing"
      device_id: device0
    charging:
      name: "charging"
      device_id: device0
    discharging:
      name: "discharging"
      device_id: device0
    online_status:
      name: "online status"
      device_id: device0

  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms1
    balancing:
      name: "balancing"
      device_id: device1
    charging:
      name: "charging"
      device_id: device1
    discharging:
      name: "discharging"
      device_id: device1
    online_status:
      name: "online status"
      device_id: device1

sensor:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    power:
      name: "power"
      device_id: device0
    state_of_charge:
      name: "state of charge"
      device_id: device0
    total_voltage:
      name: "total voltage"
      device_id: device0
    average_cell_voltage:
      name: "average cell voltage"
      device_id: device0
    delta_cell_voltage:
      name: "delta cell voltage"
      device_id: device0
    # ...

  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms1
    power:
      name: "power"
      device_id: device1
    state_of_charge:
      name: "state of charge"
      device_id: device1
    total_voltage:
      name: "total voltage"
      device_id: device1
    average_cell_voltage:
      name: "average cell voltage"
      device_id: device1
    delta_cell_voltage:
      name: "delta cell voltage"
      device_id: device1
    # ...

text_sensor:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    errors:
      name: "errors"
      device_id: device0
    operation_status:
      name: "operation status"
      device_id: device0
    device_model:
      name: "device model"
      device_id: device0

  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms1
    errors:
      name: "errors"
      device_id: device1
    operation_status:
      name: "operation status"
      device_id: device1
    device_model:
      name: "device model"
      device_id: device1

select:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    read_eeprom_register:
      name: "read eeprom register"
      device_id: device0
      optionsmap:
        0xAA: "Error Counts"

  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms1
    read_eeprom_register:
      name: "read eeprom register"
      device_id: device1
      optionsmap:
        0xAA: "Error Counts"

switch:
  - platform: ble_client
    ble_client_id: client0
    name: "enable bluetooth connection"
    id: ble_client_switch0
    device_id: device0

  - platform: ble_client
    ble_client_id: client1
    name: "enable bluetooth connection"
    id: ble_client_switch1
    device_id: device1

  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    charging:
      name: "charging"
      device_id: device0
    discharging:
      name: "discharging"
      device_id: device0

  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms1
    charging:
      name: "charging"
      device_id: device1
    discharging:
      name: "discharging"
      device_id: device1
