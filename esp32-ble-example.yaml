substitutions:
  name: jbd-bms-ble
  device_description: "Monitor and control a Xiaoxiang Battery Management System (JBD-BMS) via BLE"
  external_components_source: github://syssi/esphome-jbd-bms@main
  mac_address: 70:3e:97:07:c0:3e

esphome:
  name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jbd-bms"
    version: 2.4.0

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

packages:
  # Individual time estimation packages from remote repository
  remaining_charging_time:
    url: https://github.com/syssi/esphome-jbd-bms
    files:
      - path: packages/remaining_charging_time.yaml
        vars:
          sensor_id: bms0_remaining_charging_time
          sensor_name: "remaining charging time"
          current_sensor_id: bms0_average_current
          capacity_remaining_id: bms0_capacity_remaining
          nominal_capacity_id: bms0_nominal_capacity
  remaining_discharging_time:
    url: https://github.com/syssi/esphome-jbd-bms
    files:
      - path: packages/remaining_discharging_time.yaml
        vars:
          sensor_id: bms0_remaining_discharging_time
          sensor_name: "remaining discharging time"
          current_sensor_id: bms0_average_current
          capacity_remaining_id: bms0_capacity_remaining

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: DEBUG

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - id: client0
    mac_address: ${mac_address}

jbd_bms_ble:
  - id: bms0
    ble_client_id: client0
    # Some Liontron BMS models require an update interval of less than 8s
    update_interval: 2s
    # Default password of the JBD-SP04S034 V1.3 which requires authentication
    # password: "123456"

button:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    retrieve_hardware_version:
      name: "retrieve hardware version"
    retrieve_error_counts:
      name: "retrieve error counts"
    force_soc_reset:
      name: "force soc reset"

binary_sensor:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    balancing:
      name: "balancing"
    charging:
      name: "charging"
    discharging:
      name: "discharging"
    online_status:
      name: "online status"

sensor:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    battery_strings:
      name: "battery strings"
    current:
      name: "current"
      id: bms0_current
    power:
      name: "power"
    charging_power:
      name: "charging power"
    discharging_power:
      name: "discharging power"
    state_of_charge:
      name: "state of charge"
    nominal_capacity:
      name: "nominal capacity"
      id: bms0_nominal_capacity
    charging_cycles:
      name: "charging cycles"
    capacity_remaining:
      name: "capacity remaining"
      id: bms0_capacity_remaining
    battery_cycle_capacity:
      name: "battery cycle capacity"
    total_voltage:
      name: "total voltage"
    average_cell_voltage:
      name: "average cell voltage"
    delta_cell_voltage:
      name: "delta cell voltage"
    min_cell_voltage:
      name: "min cell voltage"
    max_cell_voltage:
      name: "max cell voltage"
    min_voltage_cell:
      name: "min voltage cell"
    max_voltage_cell:
      name: "max voltage cell"
    temperature_1:
      name: "temperature 1"
    temperature_2:
      name: "temperature 2"
    temperature_3:
      name: "temperature 3"
    temperature_4:
      name: "temperature 4"
    temperature_5:
      name: "temperature 5"
    temperature_6:
      name: "temperature 6"
    cell_voltage_1:
      name: "cell voltage 1"
    cell_voltage_2:
      name: "cell voltage 2"
    cell_voltage_3:
      name: "cell voltage 3"
    cell_voltage_4:
      name: "cell voltage 4"
    cell_voltage_5:
      name: "cell voltage 5"
    cell_voltage_6:
      name: "cell voltage 6"
    cell_voltage_7:
      name: "cell voltage 7"
    cell_voltage_8:
      name: "cell voltage 8"
    cell_voltage_9:
      name: "cell voltage 9"
    cell_voltage_10:
      name: "cell voltage 10"
    cell_voltage_11:
      name: "cell voltage 11"
    cell_voltage_12:
      name: "cell voltage 12"
    cell_voltage_13:
      name: "cell voltage 13"
    cell_voltage_14:
      name: "cell voltage 14"
    cell_voltage_15:
      name: "cell voltage 15"
    cell_voltage_16:
      name: "cell voltage 16"
    cell_voltage_17:
      name: "cell voltage 17"
    cell_voltage_18:
      name: "cell voltage 18"
    cell_voltage_19:
      name: "cell voltage 19"
    cell_voltage_20:
      name: "cell voltage 20"
    cell_voltage_21:
