substitutions:
  name: jbd-bms-up
  device_description: "Monitor a JBD UP16S010 BMS via RS485 (UP protocol)"
  external_components_source: github://syssi/esphome-jbd-bms@add-jbd-bms-up-component
  tx_pin: GPIO16
  rx_pin: GPIO17
  rx_timeout: 150ms

esphome:
  name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jbd-bms"
    version: 2.3.0

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:

api:

uart:
  - id: uart_0
    baud_rate: 9600
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    debug:
      direction: BOTH
      dummy_receiver: true
      after:
        timeout: ${rx_timeout}

interval:
  - interval: 40s
    then:
      # --- BMS address 1 ---

      # Pack Status (0x78, 0x1000): pack voltage, current, SOC, temps, cell voltages, fault bitmasks
      - uart.write: [0x01, 0x78, 0x10, 0x00, 0x10, 0xa0, 0x00, 0x00, 0x7f, 0xb2]
      - delay: 2s

      # Pack Parameters (0x78, 0x1c00): balance config, BMS/SN/mfg codes, RS485/CAN settings
      - uart.write: [0x01, 0x78, 0x1c, 0x00, 0x1c, 0xa0, 0x00, 0x00, 0x7c, 0x2e]
      - delay: 2s

      # Raw parameter block (0x78, 0x1800): 208-byte response
      - uart.write: [0x01, 0x78, 0x18, 0x00, 0x19, 0x00, 0x00, 0x00, 0x7d, 0x44]
      - delay: 2s

      # Capacity info (0x78, 0x2000): nominal/full/remaining capacity, SOH, OCV table
      - uart.write: [0x01, 0x78, 0x20, 0x00, 0x20, 0x50, 0x00, 0x00, 0x75, 0x71]
      - delay: 2s

      # WiFi module info (0x78, 0x2400)
      - uart.write: [0x01, 0x78, 0x24, 0x00, 0x24, 0x50, 0x00, 0x00, 0x75, 0xc5]
      - delay: 2s

      # Date/time (0x78, 0x2800): year/month/day/hour/minute/second at offsets 8-18
      - uart.write: [0x01, 0x78, 0x28, 0x00, 0x28, 0x0f, 0x00, 0x00, 0x46, 0x4b]
      - delay: 2s

      # Debug info (0x78, 0x2900)
      - uart.write: [0x01, 0x78, 0x29, 0x00, 0x29, 0x10, 0x00, 0x00, 0x77, 0xa0]
      - delay: 2s

      # Alternate Pack Status (0x45, 0x0000): cell voltages, temps, SOC/SOH via slave protocol
      - uart.write: [0x01, 0x45, 0x00, 0x00, 0x00, 0x54, 0x00, 0x00, 0xd4, 0xd3]
      - delay: 2s

      # --- BMS address 2 ---

      # Pack Status (0x78, 0x1000)
      - uart.write: [0x02, 0x78, 0x10, 0x00, 0x10, 0xa0, 0x00, 0x00, 0x3f, 0xa7]
      - delay: 2s

      # Pack Parameters (0x78, 0x1c00)
      - uart.write: [0x02, 0x78, 0x1c, 0x00, 0x1c, 0xa0, 0x00, 0x00, 0x3c, 0x3b]
      - delay: 2s

      # Raw parameter block (0x78, 0x1800)
      - uart.write: [0x02, 0x78, 0x18, 0x00, 0x19, 0x00, 0x00, 0x00, 0x3d, 0x51]
      - delay: 2s

      # Capacity info (0x78, 0x2000)
      - uart.write: [0x02, 0x78, 0x20, 0x00, 0x20, 0x50, 0x00, 0x00, 0x35, 0x64]
      - delay: 2s

      # WiFi module info (0x78, 0x2400)
      - uart.write: [0x02, 0x78, 0x24, 0x00, 0x24, 0x50, 0x00, 0x00, 0x35, 0xd0]
      - delay: 2s

      # Date/time (0x78, 0x2800)
      - uart.write: [0x02, 0x78, 0x28, 0x00, 0x28, 0x0f, 0x00, 0x00, 0x06, 0x5e]
      - delay: 2s

      # Debug info (0x78, 0x2900)
      - uart.write: [0x02, 0x78, 0x29, 0x00, 0x29, 0x10, 0x00, 0x00, 0x37, 0xb5]
      - delay: 2s

      # Alternate Pack Status (0x45, 0x0000)
      - uart.write: [0x02, 0x45, 0x00, 0x00, 0x00, 0x54, 0x00, 0x00, 0x94, 0xc6]
