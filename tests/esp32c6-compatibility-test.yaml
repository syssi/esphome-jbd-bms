substitutions:
  name: esp32c6-compatibility-test
  bms0: bms0
  bms1: bms1
  device_description: "Verify the project builds from source on ESP32C6"
  external_components_source: github://syssi/esphome-jbd-bms@main

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:
  level: VERY_VERBOSE

api:
  reboot_timeout: 0s

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - id: client0
    mac_address: !secret bms0_mac_address

jbd_bms_ble:
  - id: bms0
    ble_client_id: client0
    update_interval: 2s

uart:
  - id: uart_0
    baud_rate: 9600
    tx_pin: GPIO16
    rx_pin: GPIO17

jbd_bms:
  - id: bms1
    update_interval: 2s
    rx_timeout: 150ms
    # flow_control_pin: GPIO12

button:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    retrieve_hardware_version:
      name: "${bms0} retrieve hardware version"
    retrieve_error_counts:
      name: "${bms0} retrieve error counts"
    force_soc_reset:
      name: "${bms0} force soc reset"
    automatic_balancing:
      name: "${bms0} automatic balancing"
    clear_alarm:
      name: "${bms0} clear alarm"

  - platform: jbd_bms
    jbd_bms_id: bms1
    retrieve_hardware_version:
      name: "${bms1} retrieve hardware version"
    retrieve_error_counts:
      name: "${bms1} retrieve error counts"
    force_soc_reset:
      name: "${bms1} force soc reset"
    automatic_balancing:
      name: "${bms1} automatic balancing"
    clear_alarm:
      name: "${bms1} clear alarm"

sensor:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    total_voltage:
      name: "${bms0} total voltage"

  - platform: jbd_bms
    jbd_bms_id: bms1
    total_voltage:
      name: "${bms1} total voltage"
