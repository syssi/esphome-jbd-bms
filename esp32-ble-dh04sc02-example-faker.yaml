jbd_bms_ble:
  - id: bms0
    ble_client_id: client0
    update_interval: 1s

interval:
  - interval: 10s
    then:
      # Start: 0xDD 0x03 0x00 0x2F
      - lambda: |-
          id(bms0).on_jbd_bms_data(0x03, {
            0x05, 0x2B, 0xFB, 0xD2, 0x65, 0x00, 0x7A, 0xA8, 0x00, 0x01, 0x34, 0x3B, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x35, 0x52, 0x03, 0x04, 0x04, 0x0B, 0x7E, 0x0B, 0x77, 0x0B, 0x78, 0x0B, 0x7D, 0x00, 0x80, 0x00, 0x7A, 0xA8,
            0x65, 0x00, 0x00, 0x00, 0x00, 0x00, 0x19, 0x00, 0x00, 0x00, 0x00
          });
      # End: 0xF7 0x15 0x77

      - delay: 1s
      # Start: 0xDD 0x04 0x00 0x08
      - lambda: |-
          id(bms0).on_jbd_bms_data(0x04, {
            0x0C, 0xEE, 0x0C, 0xEA, 0x0C, 0xED, 0x0C, 0xED
          });
      # End: 0xFC 0x16 0x77

      - delay: 1s
      # Start: 0xDD, 0x03, 0x00, 0x2F
      - lambda: |-
          id(bms0).on_jbd_bms_data(0x03, {
            0x05, 0x2B, 0xFB, 0xB4, 0x64, 0xD2, 0x7A, 0xA8, 0x00, 0x01, 0x34, 0x3B, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x35, 0x52, 0x03, 0x04, 0x04, 0x0B, 0x7E, 0x0B, 0x77, 0x0B, 0x78, 0x0B, 0x7D, 0x00, 0x80, 0x00, 0x7A, 0xA8,
            0x64, 0xD2, 0x00, 0x00, 0x00, 0x00, 0x19, 0x00, 0x00, 0x00, 0x00
          });
      # End: 0xF5 0x91 0x77

      - delay: 1s
      # Start: 0xDD 0x04 0x00 0x08
      - lambda: |-
          id(bms0).on_jbd_bms_data(0x04, {
            0x0C, 0xED, 0x0C, 0xEA, 0x0C, 0xEC, 0x0C, 0xED
          });
      # End: 0xFC 0x18 0x77
