substitutions:
  name: jbd-bms-up
  bms0: "bms0"
  bms1: "bms1"
  device_description: "Monitor two JBD UP16S010 BMS via RS485 (UP protocol)"
  external_components_source: github://syssi/esphome-jbd-bms@main
  tx_pin: GPIO16
  rx_pin: GPIO17
  rx_timeout: 150ms

esphome:
  name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jbd-bms"
    version: 2.3.0
  devices:
    - id: device0
      name: "${bms0}"
    - id: device1
      name: "${bms1}"

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:

api:

uart:
  - id: uart_0
    baud_rate: 9600
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}

jbd_bms_up:
  - id: bus0
    uart_id: uart_0
    rx_timeout: ${rx_timeout}
    # flow_control_pin: GPIO4

jbd_bms_up_pack:
  - id: bms0
    jbd_bms_up_id: bus0
    address: 1
    update_interval: 5s
  - id: bms1
    jbd_bms_up_id: bus0
    address: 2
    update_interval: 5s

binary_sensor:
  - platform: jbd_bms_up_pack
    jbd_bms_up_pack_id: bms0
    charging:
      name: "${bms0} charging"
      device_id: device0
    discharging:
      name: "${bms0} discharging"
      device_id: device0
    precharging:
      name: "${bms0} precharging"
      device_id: device0
    heat:
      name: "${bms0} heat"
      device_id: device0
    fan:
      name: "${bms0} fan"
      device_id: device0
    online_status:
      name: "${bms0} online status"
      device_id: device0
  - platform: jbd_bms_up_pack
