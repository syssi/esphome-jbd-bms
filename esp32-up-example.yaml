substitutions:
  name: jbd-bms-up
  device_description: "Monitor a JBD UP16S010 BMS via RS485 (UP protocol)"
  external_components_source: github://syssi/esphome-jbd-bms@main
  tx_pin: GPIO16
  rx_pin: GPIO17
  rx_timeout: 150ms

esphome:
  name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jbd-bms"
    version: 2.3.0

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:

api:

uart:
  - id: uart_0
    baud_rate: 9600
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    debug:
      direction: BOTH

jbd_bms_up:
  - id: bus0
    uart_id: uart_0
    rx_timeout: ${rx_timeout}
    # flow_control_pin: GPIO4

jbd_bms_up_pack:
  - id: bms0
    jbd_bms_up_id: bus0
    address: 1
    update_interval: 5s

binary_sensor:
  - platform: jbd_bms_up_pack
    jbd_bms_up_pack_id: bms0
    balancing:
      name: "${name} balancing"
    charging:
      name: "${name} charging"
    discharging:
      name: "${name} discharging"
    precharging:
      name: "${name} precharging"
    heat:
      name: "${name} heat"
    fan:
      name: "${name} fan"
    online_status:
      name: "${name} online status"

sensor:
